<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PlastiCore AI</title>
  <meta name="description" content="Sign in to PlastiCore AI to analyze plastic waste and track your environmental impact."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">PlastiCore<em>AI</em></span>
      </a>
      <nav class="header-nav">
        <a href="/index.html">Home</a>
        <a href="/register.html" class="nav-auth-link nav-signup">Sign Up</a>
      </nav>
    </div>
  </header>

  <!-- AUTH PAGE -->
  <section class="auth-section">
    <div class="auth-container">
      <!-- Decorative background -->
      <div class="auth-bg-orb"></div>
      <div class="auth-bg-grid"></div>

      <!-- Login Card -->
      <div class="auth-card">
        <div class="auth-card-header">
          <div class="auth-icon">🔐</div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to your PlastiCore AI account</p>
        </div>

        <!-- Error message -->
        <div class="auth-error" id="authError" style="display:none"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="form-input" 
              placeholder="••••••••"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn-primary btn-auth-submit">Sign In</button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="/register.html">Create one →</a></p>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo" style="justify-content:center;margin-bottom:12px">
        <span class="logo-icon">◈</span>
        <span class="logo-text">PlastiCore<em>AI</em></span>
      </div>
      <p class="footer-note">AI-powered plastic waste classification & construction reuse mapping.</p>
    </div>
  </footer>

  <script src="auth.js"></script>
</body>
</html>
