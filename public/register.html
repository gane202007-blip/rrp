<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — PlastiCore AI</title>
  <meta name="description" content="Create your PlastiCore AI account to start analyzing plastic waste and tracking environmental impact."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/index.html" class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">PlastiCore<em>AI</em></span>
      </a>
      <nav class="header-nav">
        <a href="/index.html">Home</a>
        <a href="/login.html" class="nav-auth-link">Login</a>
      </nav>
    </div>
  </header>

  <!-- AUTH PAGE -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-bg-orb"></div>
      <div class="auth-bg-grid"></div>

      <!-- Register Card -->
      <div class="auth-card auth-card-register">
        <div class="auth-card-header">
          <div class="auth-icon">🌱</div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join PlastiCore AI and start making an impact</p>
        </div>

        <!-- Error message -->
        <div class="auth-error" id="authError" style="display:none"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              class="form-input" 
              placeholder="John Doe"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              class="form-input" 
              placeholder="Min 6 characters"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              class="form-input" 
              placeholder="Re-enter password"
              required
              minlength="6"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="roleSelect" class="form-label">Account Type</label>
            <select id="roleSelect" name="role" class="form-input form-select" onchange="toggleAdminKey()">
              <option value="user">🧑 Regular User</option>
              <option value="admin">🛡️ Admin (College / NGO)</option>
            </select>
          </div>

          <!-- Admin Secret Key (hidden by default) -->
          <div class="form-group" id="adminKeyGroup" style="display:none">
            <label for="adminSecretKey" class="form-label">Admin Secret Key</label>
            <input 
              type="password" 
              id="adminSecretKey" 
              name="adminSecretKey" 
              class="form-input" 
              placeholder="Enter admin key from administrator"
            />
            <p class="form-hint">Contact your college/NGO administrator for this key.</p>
          </div>

          <button type="submit" class="btn-primary btn-auth-submit">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login.html">Sign in →</a></p>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="logo" style="justify-content:center;margin-bottom:12px">
        <span class="logo-icon">◈</span>
        <span class="logo-text">PlastiCore<em>AI</em></span>
      </div>
      <p class="footer-note">AI-powered plastic waste classification & construction reuse mapping.</p>
    </div>
  </footer>

  <script src="auth.js"></script>
</body>
</html>
