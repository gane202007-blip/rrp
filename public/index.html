  <!-- ✅ AI SCRIPT -->
  <script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/oe91x_hTUG/"; // 🔴 REPLACE THIS

  let model;

  async function loadModel() {
    try {
      const modelURL = MODEL_URL + "model.json";
      const metadataURL = MODEL_URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      console.log("Model Loaded");
    } catch (err) {
      console.error("Error loading model", err);
    }
  }

  loadModel();

  async function analyzeImageAI(img) {
    const prediction = await model.predict(img);
    let best = prediction.reduce((a,b)=>a.probability>b.probability?a:b);

    if(best.className==="Plastic" && best.probability>=0.85){
      return "Plastic";
    } else {
      return "Not Plastic";
    }
  }

  document.getElementById("analyzeBtn").onclick = async () => {
    const file = document.getElementById("fileInput").files[0];
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = async () => {
      const result = await analyzeImageAI(img);
      document.getElementById("result").innerText = result;
    }
  }
  </script>

  <script src="app.js"></script>
